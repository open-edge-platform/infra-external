name: Post-Merge Scorecard CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  call-scorecard:
    permissions:
      security-events: write   # required for SARIF upload
      id-token: write
      contents: read
      actions: read

    uses: open-edge-platform/orch-ci/.github/workflows/post-merge-scorecard.yml@3ed16b28047d4687046f05320ea50b33e3897e06  # 2026.0.12
    with:
      project_folder: "."
    secrets:
      SYS_EMF_GH_TOKEN: ${{ secrets.SYS_EMF_GH_TOKEN }}
