---

version: 2
updates:
  # Go modules - separate block for each directory
  - package-ecosystem: "gomod"
    directory: "/loca-metadata"
    schedule:
      interval: daily
    open-pull-requests-limit: 3
    commit-message:
      prefix: "[gomod] "
    groups:
      dependencies:
        patterns:
          - "*"
        exclude-patterns:  # Internal dependencies are update into separate PRs.
          - "*open-edge-platform*"
      internal-dependencies:
        patterns:
          - "*open-edge-platform*"

  - package-ecosystem: "gomod"
    directory: "/loca-onboarding"
    schedule:
      interval: daily
    open-pull-requests-limit: 3
    commit-message:
      prefix: "[gomod] "
    groups:
      dependencies:
        patterns:
          - "*"
        exclude-patterns:  # Internal dependencies are update into separate PRs.
          - "*open-edge-platform*"
      internal-dependencies:
        patterns:
          - "*open-edge-platform*"

  - package-ecosystem: "gomod"
    directory: "/loca-templates"
    schedule:
      interval: daily
    open-pull-requests-limit: 3
    commit-message:
      prefix: "[gomod] "
    groups:
      dependencies:
        patterns:
          - "*"
        exclude-patterns:  # Internal dependencies are update into separate PRs.
          - "*open-edge-platform*"
      internal-dependencies:
        patterns:
          - "*open-edge-platform*"

  - package-ecosystem: "gomod"
    directory: "/dm-manager"
    schedule:
      interval: daily
    open-pull-requests-limit: 3
    commit-message:
      prefix: "[gomod] "
    groups:
      dependencies:
        patterns:
          - "*"
        exclude-patterns:  # Internal dependencies are update into separate PRs.
          - "*open-edge-platform*"
      internal-dependencies:
        patterns:
          - "*open-edge-platform*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    commit-message:
      prefix: "[gha] "
